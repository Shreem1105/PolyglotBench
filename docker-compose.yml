version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: docker
      DATABASE_URL: sqlite:///./data/polyglotbench.db
      # DATABASE_URL: postgresql+psycopg2://polyglotbench:polyglotbench@postgres:5432/polyglotbench
      DEFAULT_BASELINE_MODEL: gpt-4o-mini
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polyglotbench
      POSTGRES_USER: polyglotbench
      POSTGRES_PASSWORD: polyglotbench
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
